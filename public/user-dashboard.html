<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="user-dashboard.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <i class='bx bx-arrow-back back-icon' onclick="closeSidebar()"></i>
        <h2>Menu</h2>
    </div>
    <a href="http://10.243.246.221:3000" id="start-tracking-link">
        <i class='bx bx-play-circle'></i> Start Tracking
    </a>
    <a href="#" onclick="showMailMessage()">
        <i class='bx bx-help-circle'></i> Help & Support
    </a>
    <a href="/login" onclick="localStorage.clear();">
        <i class='bx bx-log-out'></i> Logout
    </a>
</div>

<header class="topbar">
    <div class="menu-logo">
        <i class='bx bx-menu menu-icon' onclick="toggleSidebar()"></i>
        <h2>Live Tracking Dashboard</h2>
    </div>
    <div class="user-menu">
        <button onclick="toggleDetails()">
            Hi, <span id="name"></span>
            <i class='bx bx-chevron-down'></i>
        </button>
        <div class="user-details" id="detailsBox">
            <p><strong>User Id:</strong> <span id="userid"></span></p>
            <p><strong>Email:</strong> <span id="email"></span></p>
        </div>
    </div>
</header>

<section class="dashboard-container">
    <h1 class="page-title">Tracked Persons</h1>
    <div id="historyData"></div>
</section>

<script>
/**
 * UI INTERFACE TOGLE CONTROLLERS
 */
function toggleSidebar(){
    document.getElementById("sidebar").classList.add("active");
}

function closeSidebar(){
    document.getElementById("sidebar").classList.remove("active");
}

function toggleDetails(){
    const box = document.getElementById("detailsBox");
    box.style.display = (box.style.display === "block") ? "none" : "block";
}

function showMailMessage(){
    alert("Please send query to livelocationproject2026@gmail.com");
}

/**
 * SECURE ACCESS GUARD
 */
const user = JSON.parse(localStorage.getItem("user"));
if(user && user.userid){
    document.getElementById("name").innerText = user.name;
    document.getElementById("userid").innerText = user.userid;
    document.getElementById("email").innerText = user.email;

    document.getElementById("start-tracking-link").href = `https://live-tracking-frontend-eight.vercel.app/?userid=${encodeURIComponent(user.userid)}&name=${encodeURIComponent(user.name)}&email=${encodeURIComponent(user.email)}`;
} else {
    window.location.href = "/login";
}

/**
 * SAFE FOLDER TOGGLER
 */
function toggleFolder(folderId){
    const folder = document.getElementById(`folder-${folderId}`);
    if(folder) {
        folder.style.display = (folder.style.display === "none" || folder.style.display === "") ? "flex" : "none";
    }
}

/**
 * RELATIVE TIMESTAMP FORMATTING MATRIX
 */
function getTimeAgo(date){
    const seconds = Math.floor((new Date() - new Date(date))/1000);
    let interval = seconds / 86400;
    if(interval > 1) return Math.floor(interval) + " days ago";
    interval = seconds / 3600;
    if(interval > 1) return Math.floor(interval) + " hours ago";
    interval = seconds / 60;
    if(interval > 1) return Math.floor(interval) + " mins ago";
    return "Just now";
}

// STATEMENT: Client-side dynamic API lookups (getPlaceName function) ko poori tarah remove kar diya gaya hai network choking se bachne ke liye.

/**
 * CORE RENDER ENGINE (OPTIMIZED WITH PRE-SAVED DB PLACENAME)
 * STATEMENT: Loops ke andar se 'async API requests' hata kar linear sync rendering restore ki gayi hai.
 */
async function loadTrackingHistory(){
    try{
        if(!user || !user.userid) {
            document.getElementById("historyData").innerHTML = "<p style='color:red; padding:20px;'>User session missing. Please log in again.</p>";
            return;
        }
        
        document.getElementById("historyData").innerHTML = "<p style='color:#666; padding:20px;'>Loading tracking data from Render server (May take 50s if backend is sleeping)...</p>";

        const response = await fetch(`https://live-tracker-backend-nj1r.onrender.com/get-locations/${encodeURIComponent(user.userid)}`);
        
        if (!response.ok) {
            throw new Error(`Backend server returned error status: ${response.status}`);
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
            console.error("Expected array but received:", data);
            document.getElementById("historyData").innerHTML = `<p style='color:#ff3b30; padding:20px;'><b>Backend Error:</b> ${data.message || 'Invalid data format from server.'}</p>`;
            return;
        }

        if (data.length === 0) {
            document.getElementById("historyData").innerHTML = "<p style='color:#666; padding:20px;'>No tracked locations found for this user.</p>";
            return;
        }

        const grouped = {};
        data.forEach(item => {
            if(!item || !item.personName) return; 
            if(!grouped[item.personName]){
                grouped[item.personName] = [];
            }
            grouped[item.personName].push(item);
        });

        let html = "";

        // STATEMENT: 'for...of' loop ko fir se efficient native 'forEach' array loop se replace kar diya gaya hai kyunki ab client-side par koi async lookup delay nahi bacha.
        Object.keys(grouped).forEach(person => {
            const latest = grouped[person][0];
            const safeDOMId = "user_" + user.userid.replace(/[^a-zA-Z0-9]/g, "") + "_" + person.replace(/[^a-zA-Z0-9]/g, "");

            html += `
            <div class="person-folder" id="container-${safeDOMId}">
                <div class="folder-header" onclick="toggleFolder('${safeDOMId}')">
                    <div class="folder-left">
                        <i class='bx bxs-folder folder-icon'></i>
                        <div>
                            <h3>${person}</h3>
                            <p>${grouped[person].length} Locations • Updated ${getTimeAgo(latest.createdAt)}</p>
                        </div>
                    </div>
                    <button class="delete-person-btn" onclick="event.stopPropagation(); deletePerson(this)" data-person="${encodeURIComponent(person)}">
                        <i class='bx bx-trash'></i> Delete Folder
                    </button>
                </div>
                <div class="folder-content" id="folder-${safeDOMId}" style="display:none;">
            `;

            grouped[person].forEach(location => {
                const lat = location.latitude ? Number(location.latitude).toFixed(6) : "0.000000";
                const lng = location.longitude ? Number(location.longitude).toFixed(6) : "0.000000";
                
                // STATEMENT: Database mein store kiye huye 'placeName' parameter ko fallback handling ke sath direct extract kiya gaya hai.
                const dbPlaceName = location.placeName || "Location name parsing error or legacy record";

                html += `
                <div class="location-card" id="card-${location._id}">
                    <div class="location-header">
                        <h4><i class='bx bx-map'></i> Location Record</h4>
                        <button class="delete-location-btn" onclick="deleteLocation('${location._id}')">
                            <i class='bx bx-trash'></i>
                        </button>
                    </div>
                    
                    <div style="margin-bottom:15px; background: #eef7ff; padding: 12px; border-radius: 10px; border: 1px dashed #0099ff;">
                        <span style="color:#007aff; font-size:11px; font-weight:bold; display:block; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px;"><i class='bx bxs-navigation'></i> Stored Address Location</span>
                        <p style="color:#222; font-size:14px; line-height:1.4; font-weight:500; margin:0;">${dbPlaceName}</p>
                    </div>

                    <div class="coordinate-box">
                        <div>
                            <span>Latitude</span>
                            <h3>${lat}</h3>
                        </div>
                        <div>
                            <span>Longitude</span>
                            <h3>${lng}</h3>
                        </div>
                    </div>
                    <p class="timestamp">
                        <i class='bx bx-time'></i> ${new Date(location.createdAt).toLocaleString()}
                    </p>
                </div>
                `;
            });

            html += `</div></div>`;
        });

        document.getElementById("historyData").innerHTML = html;

    } catch(err){
        console.error("Critical breakdown tracking user updates configuration error:", err);
        document.getElementById("historyData").innerHTML = `<p style='color:#ff3b30; padding:20px;'><b>Connection Error:</b> Unable to reach tracking server. (${err.message})</p>`;
    }
}

async function deleteLocation(id){
    if(!confirm("Delete this coordinate record?")) return;
    try {
        const response = await fetch(`https://live-tracker-backend-nj1r.onrender.com/delete-location/${id}/${encodeURIComponent(user.userid)}`, {
            method: "DELETE"
        });
        const resData = await response.json();
        if(resData.success) {
            loadTrackingHistory();
        } else {
            alert("Failed to delete record.");
        }
    } catch(err) {
        console.error(err);
    }
}

async function deletePerson(element){
    const rawPerson = element.getAttribute("data-person");
    const personName = decodeURIComponent(rawPerson);
    
    if(!confirm(`Delete all coordinates and folder history for ${personName}?`)) return;
    try {
        const response = await fetch(`https://live-tracker-backend-nj1r.onrender.com/delete-person/${rawPerson}/${encodeURIComponent(user.userid)}`, {
            method: "DELETE"
        });
        const resData = await response.json();
        if(resData.success) {
            loadTrackingHistory();
        } else {
            alert("Failed to delete user history.");
        }
    } catch(err) {
        console.error(err);
    }
}

window.deleteLocation = deleteLocation;
window.deletePerson = deletePerson;
window.toggleFolder = toggleFolder;

loadTrackingHistory();
</script>
</body>
</html>
